name: ToughScan
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
packages:
  ToughScanPackage:
    path: .
targets:
  ToughScan:
    type: application
    platform: iOS
    sources:
      - ToughScan
    dependencies:
      - package: ToughScanPackage
        product: ToughScanCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.toughscan
        PRODUCT_NAME: Tough Scan
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: Tough Scan uses the camera to progressively recover hard-to-read text documents. Processing stays on this iPhone.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Tough Scan can save exported scans only when you choose to export them.
    info:
      path: ToughScan/Info.plist
      properties:
        CFBundleDisplayName: Tough Scan
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  ToughScanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ToughScanTests
      - ToughScan/Export/ScanExportBundle.swift
      - ToughScan/Export/ScanExportService.swift
      - ToughScan/Camera/CameraControlState.swift
      - ToughScan/Processing/DocumentSnapshot.swift
      - ToughScan/Processing/ScannedPage.swift
    dependencies:
      - package: ToughScanPackage
        product: ToughScanCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.toughscan.tests
        SWIFT_VERSION: 5.10
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        GENERATE_INFOPLIST_FILE: YES
schemes:
  ToughScan:
    build:
      targets:
        ToughScan: all
        ToughScanTests: [test]
    test:
      targets:
        - ToughScanTests

