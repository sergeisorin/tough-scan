name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core-checks:
    name: Core Swift checks
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build

      - name: Run core checks
        run: swift run ToughScanCoreChecks

  ios-build:
    name: iOS app build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for Xcode with iOS 26 SDK
        id: ios26
        run: |
          set +e
          XCODE_DEVELOPER_DIR=$(python3 -c 'import glob, os; candidates = [app_path for app_path in glob.glob("/Applications/Xcode*.app") if glob.glob(os.path.join(app_path, "Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator26*.sdk"))]; print(os.path.join(sorted(candidates)[-1], "Contents/Developer") if candidates else "")')
          if [ -z "$XCODE_DEVELOPER_DIR" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No installed Xcode has an iOS 26 simulator SDK. Skipping iOS app build and unit tests on this runner."
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "developer_dir=$XCODE_DEVELOPER_DIR" >> "$GITHUB_OUTPUT"
          sudo xcode-select -s "$XCODE_DEVELOPER_DIR"
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version

      - name: Report skipped iOS 26 checks
        if: steps.ios26.outputs.available != 'true'
        run: echo "iOS app build and unit tests require an iOS 26 SDK. Core Swift checks remain required in this CI run."

      - name: Install XcodeGen
        if: steps.ios26.outputs.available == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.ios26.outputs.available == 'true'
        run: xcodegen generate

      - name: Build iOS app
        if: steps.ios26.outputs.available == 'true'
        run: xcodebuild -project ToughScan.xcodeproj -scheme ToughScan -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

      - name: Run iOS unit tests
        if: steps.ios26.outputs.available == 'true'
        run: |
          DEVICE_TYPE=$(xcrun simctl list devicetypes --json | python3 -c 'import json, sys; types = json.load(sys.stdin)["devicetypes"]; preferred = ["iPhone 16 Pro", "iPhone 16", "iPhone 15 Pro", "iPhone 15"]; matches = [device_type["identifier"] for name in preferred for device_type in types if device_type["name"] == name] or [device_type["identifier"] for device_type in types if device_type["name"].startswith("iPhone")]; print(matches[0] if matches else sys.exit("No iPhone simulator device type found"))')
          RUNTIME=$(xcrun simctl list runtimes --json | python3 -c 'import json, sys; runtimes = [runtime for runtime in json.load(sys.stdin)["runtimes"] if runtime.get("isAvailable") and runtime.get("platform") == "iOS"]; runtimes.sort(key=lambda runtime: runtime.get("version", "")); print(runtimes[-1]["identifier"] if runtimes else sys.exit("No available iOS simulator runtime found"))')
          DEVICE_ID=$(xcrun simctl create "ToughScan CI iPhone" "$DEVICE_TYPE" "$RUNTIME")
          xcodebuild test -project ToughScan.xcodeproj -scheme ToughScan -destination "platform=iOS Simulator,id=$DEVICE_ID" CODE_SIGNING_ALLOWED=NO
